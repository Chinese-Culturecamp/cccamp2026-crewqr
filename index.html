<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>寻昔纪远 · Crew QR Code</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{--gold:#c8a96e;--gold2:rgba(200,169,110,0.4);--dark:#1a0e08;--card-bg:rgba(20,10,5,0.85);--text:#f0e6d3;--muted:rgba(240,230,211,0.5);}
    body{min-height:100vh;background:var(--dark);font-family:'Montserrat',sans-serif;color:var(--text);position:relative;overflow-x:hidden;}
    .bg{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url('https://i.imgur.com/8I0PjjL.jpeg');background-size:cover;background-position:center;opacity:0.35;z-index:0;}
    .wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
    .title{font-family:'Noto Serif SC',serif;font-size:24px;letter-spacing:5px;color:var(--text);margin-bottom:4px;text-align:center;}
    .sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:32px;text-align:center;}
    .card{background:var(--card-bg);border:1px solid var(--gold2);border-radius:12px;padding:28px 24px;width:100%;max-width:400px;}
    .field-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
    .search-row{display:flex;gap:8px;margin-bottom:16px;}
    .search-input{flex:1;padding:12px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--gold2);border-radius:8px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:14px;outline:none;}
    .search-input:focus{border-color:var(--gold);}
    .search-input::placeholder{color:var(--muted);}
    .search-btn{padding:12px 18px;border-radius:8px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--gold);background:rgba(200,169,110,0.2);color:var(--gold);}
    .search-btn:active{opacity:0.7;}
    .results{display:none;}
    .results.show{display:block;}
    .results-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
    .result-item{background:rgba(255,255,255,0.04);border:1px solid var(--gold2);border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
    .result-item:active{background:rgba(200,169,110,0.15);border-color:var(--gold);}
    .result-name-cn{font-family:'Noto Serif SC',serif;font-size:15px;color:var(--text);letter-spacing:2px;}
    .result-name-en{font-size:10px;color:var(--muted);letter-spacing:1px;margin-top:2px;}
    .result-role{font-size:10px;color:var(--gold);letter-spacing:1px;margin-top:2px;}
    .result-arrow{color:var(--gold);font-size:14px;}
    .no-result{font-size:12px;color:var(--muted);text-align:center;letter-spacing:1px;padding:12px 0;}
    .qr-view{display:none;}
    .qr-view.show{display:block;}
    .qr-header{display:flex;align-items:center;margin-bottom:20px;}
    .back-btn{background:none;border:none;color:var(--gold);cursor:pointer;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:0;margin-right:12px;}
    .qr-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
    .qr-name-cn{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--text);letter-spacing:4px;margin-bottom:4px;text-align:center;}
    .qr-name-en{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;text-align:center;}
    .qr-meta{font-size:10px;color:var(--gold);letter-spacing:2px;text-align:center;margin-bottom:4px;}
    .qr-id{font-size:10px;color:rgba(200,169,110,0.5);letter-spacing:2px;text-align:center;margin-bottom:20px;}
    .qr-img-wrap{display:flex;justify-content:center;margin-bottom:16px;}
    .qr-img-wrap canvas{border-radius:8px;max-width:100%;}
    .qr-hint{font-size:10px;color:var(--muted);letter-spacing:1px;text-align:center;margin-bottom:16px;}
    .download-btn{width:100%;padding:12px;border-radius:8px;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--gold2);background:rgba(200,169,110,0.12);color:var(--gold);text-decoration:none;display:block;text-align:center;}
    .event-name{font-size:9px;color:rgba(240,230,211,0.25);letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:20px;}
    .loading{position:fixed;inset:0;background:rgba(10,5,2,0.7);display:none;align-items:center;justify-content:center;z-index:999;}
    .loading.show{display:flex;}
    .spinner{width:36px;height:36px;border:2px solid var(--gold2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="wrap">
  <div class="title">寻昔纪远</div>
  <div class="sub">Crew · My QR Code</div>
  <div class="card">
    <div id="searchView">
      <div class="field-label">Search by Name</div>
      <div class="search-row">
        <input type="text" class="search-input" id="searchInput" placeholder="Enter your name..." autocomplete="off">
        <button class="search-btn" onclick="doSearch()">Search</button>
      </div>
      <div class="results" id="resultsBox">
        <div class="results-label" id="resultsLabel"></div>
        <div id="resultsList"></div>
      </div>
    </div>
    <div class="qr-view" id="qrView">
      <div class="qr-header">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <div class="qr-title">Your QR Code</div>
      </div>
      <div class="qr-name-cn" id="qrNameCN"></div>
      <div class="qr-name-en" id="qrNameEN"></div>
      <div class="qr-meta" id="qrMeta"></div>
      <div class="qr-id" id="qrID"></div>
      <div class="qr-img-wrap"><canvas id="qrCanvas"></canvas></div>
      <div class="qr-hint">Screenshot or download to save your QR Code</div>
      <a class="download-btn" href="#" onclick="downloadQR(event)">Download QR Code</a>
      <div class="event-name">寻昔纪远 · Culture Camp 2026</div>
    </div>
  </div>
</div>
<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwNniD-7Uwpus7k-ZhWTrGZpeh60qVilmWthAvlXtvkwks5WSXOQrTm1WcVaQCpsQ4A/exec";
const BG_URL = "https://i.imgur.com/N2Ktl01.jpeg";
let cachedData = null;
let currentQRData = null;

document.getElementById('searchInput').addEventListener('keypress', e => { if(e.key==='Enter') doSearch(); });

async function getData() {
  if(cachedData) return cachedData;
  showLoading(true);
  const res = await fetch(`${WEB_APP_URL}?action=get_crew_data`);
  const data = await res.json();
  showLoading(false);
  if(data.success) cachedData = data.rows;
  return data.rows || [];
}

async function doSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if(!query) return;
  const rows = await getData();
  const matches = rows.filter(r =>
    String(r[1]||'').toLowerCase().includes(query) ||
    String(r[2]||'').toLowerCase().includes(query)
  );
  const box = document.getElementById('resultsBox');
  const label = document.getElementById('resultsLabel');
  const list = document.getElementById('resultsList');
  box.classList.add('show');
  if(matches.length === 0) {
    label.textContent = 'No results found';
    list.innerHTML = '<div class="no-result">Try a different name spelling.</div>';
    return;
  }
  label.textContent = `${matches.length} result${matches.length > 1 ? 's' : ''} found`;
  list.innerHTML = matches.map(r => `
    <div class="result-item" onclick="showQR('${r[0]}','${esc(r[1])}','${esc(r[2])}','${esc(r[3]||'')}')">
      <div>
        <div class="result-name-cn">${r[1]}</div>
        <div class="result-name-en">${r[2]}</div>
        <div class="result-role">${r[3]||''}</div>
      </div>
      <div class="result-arrow">›</div>
    </div>`).join('');
}

async function showQR(id, nameCN, nameEN, crewRole) {
  currentQRData = { id, nameCN, nameEN, crewRole };
  document.getElementById('qrNameCN').textContent = nameCN;
  document.getElementById('qrNameEN').textContent = nameEN;
  document.getElementById('qrMeta').textContent = crewRole;
  document.getElementById('qrID').textContent = `ID: ${id}`;
  document.getElementById('searchView').style.display = 'none';
  document.getElementById('qrView').classList.add('show');
  showLoading(true);
  await generateQRCanvas(id, nameCN, nameEN, crewRole);
  showLoading(false);
}

async function generateQRCanvas(id, nameCN, nameEN, crewRole) {
  const qrApiUrl = `https://quickchart.io/qr?text=${encodeURIComponent(String(id))}&size=300&margin=2`;
  const canvas = document.getElementById('qrCanvas');
  const ctx = canvas.getContext('2d');

  const [bgImg, qrImg] = await Promise.all([
    loadImage(BG_URL),
    loadImage(qrApiUrl)
  ]);

  const W = 360, H = 560;
  canvas.width = W;
  canvas.height = H;

  // Background
  ctx.drawImage(bgImg, 0, 0, W, H);

  // Subtle dark overlay only on bottom half for text readability
  const grad = ctx.createLinearGradient(0, H * 0.35, 0, H);
  grad.addColorStop(0, 'rgba(10,5,2,0)');
  grad.addColorStop(0.4, 'rgba(10,5,2,0.55)');
  grad.addColorStop(1, 'rgba(10,5,2,0.82)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // QR Code — centered, sitting in upper-middle area
  const qrSize = 210;
  const qrX = (W - qrSize) / 2;
  const qrY = H * 0.18; // ~100px from top

  // White QR background with padding
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.roundRect(qrX - 10, qrY - 10, qrSize + 20, qrSize + 20, 10);
  ctx.fill();

  // Draw QR
  ctx.drawImage(qrImg, qrX, qrY, qrSize, qrSize);

  // Text block starts below QR
  const textStart = qrY + qrSize + 36;

  // Thin gold divider
  ctx.strokeStyle = 'rgba(200,169,110,0.5)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(60, textStart - 16);
  ctx.lineTo(W - 60, textStart - 16);
  ctx.stroke();

  // Chinese name — medium size
  ctx.fillStyle = '#f0e6d3';
  ctx.font = 'bold 22px "Noto Serif SC", serif';
  ctx.textAlign = 'center';
  ctx.fillText(nameCN, W / 2, textStart + 4);

  // English name
  ctx.fillStyle = 'rgba(240,230,211,0.6)';
  ctx.font = '12px Montserrat, sans-serif';
  ctx.fillText(nameEN, W / 2, textStart + 24);

  // Role
  ctx.fillStyle = '#c8a96e';
  ctx.font = '600 11px Montserrat, sans-serif';
  ctx.fillText(crewRole, W / 2, textStart + 46);

  // ID
  ctx.fillStyle = 'rgba(200,169,110,0.45)';
  ctx.font = '9px Montserrat, sans-serif';
  ctx.fillText(`ID: ${id}`, W / 2, textStart + 64);

  // Event name at very bottom
  ctx.fillStyle = 'rgba(240,230,211,0.22)';
  ctx.font = '8px Montserrat, sans-serif';
  ctx.fillText('寻昔纪远 · CULTURE CAMP 2026', W / 2, H - 16);
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function downloadQR(e) {
  e.preventDefault();
  const canvas = document.getElementById('qrCanvas');
  const d = currentQRData;
  const filename = `${d.nameCN}_${d.id}_crew_qr.png`;
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = filename;
  a.click();
}

function goBack() {
  document.getElementById('qrView').classList.remove('show');
  document.getElementById('searchView').style.display = 'block';
}

function esc(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function showLoading(show) { document.getElementById('loading').classList.toggle('show', show); }
</script>
</body>
</html>
